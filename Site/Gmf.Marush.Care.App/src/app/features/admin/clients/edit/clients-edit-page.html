@if(form())
{
<form class="clients-edit-form row offset-tablet-2 column-tablet-8 offset-desktop-3 column-desktop-6" [formGroup]="form()!" (submit)="onSubmit()">
    <marush-input class="column-12" name="name" placeholder="Ime" [form]="form()!" [autoComplete]="true"
        [validation]="['maxlength', 'required']" />
    <marush-input class="column-12" name="surname" placeholder="Prezime" [form]="form()!" [autoComplete]="true"
        [validation]="['maxlength', 'required']" />
    <marush-field-group class="column-12" addOperationDescription="Dodaj telefon" dynamicContentName="phones"
        title="Telefoni" [addDynamicContent]="addPhone" [formGroup]="form()!">
        @for(phone of phones.controls; track $index)
        {
        <div class="row column-12">
            <marush-input class="grow-nested-block" name="phone" placeholder="Telefon" customValidation="pattern"
                customValidationMessage="Telefon mora biti u formatu 06XXXXXXXX ili +XXXXXXXXXXXX" [form]="phone"
                [validation]="['required', 'pattern']" />
            <button class="main-action delete-action clients-delete-action " type="button"
                (click)="removePhone($index)">
                <img class="icon" alt="Ukloni telefon" src="/assets/images/actions/trash-can.svg">
            </button>
        </div>
        }
    </marush-field-group>
    <marush-field-group class="column-12" addOperationDescription="Dodaj email" dynamicContentName="emails"
        title="Emailovi" [addDynamicContent]="addEmail" [formGroup]="form()!">
        @for(email of emails.controls; track $index)
        {
        <div class="row column-12">
            <marush-input class="grow-nested-block" name="email" placeholder="Email" [form]="email"
                [validation]="['required', 'email', 'maxlength']" />
            <button class="main-action delete-action clients-delete-action " type="button"
                (click)="removeEmail($index)">
                <img class="icon" alt="Ukloni email" src="/assets/images/actions/trash-can.svg">
            </button>
        </div>
        }
    </marush-field-group>
    <marush-date-picker class="column-12" name="birthday" placeholder="Datum rođenja" [form]="form()!" [startDate]="averageClientAge" />
    <marush-input class="column-12" name="city" placeholder="Mesto prebivališta" [form]="form()!" [autoComplete]="true"
        [validation]="['maxlength']" />
    <marush-input class="column-12" name="diagnosis" placeholder="Dijagnoze" [form]="form()!" [validation]="['maxlength']"
        [big]="true" />
    <marush-input class="column-12" name="allergies" placeholder="Alergije" [form]="form()!" [validation]="['maxlength']"
        [big]="true" />
    <marush-input class="column-12" name="comments" placeholder="Komentari" [form]="form()!" [validation]="['maxlength']"
        [big]="true" />
    <marush-input class="column-12" name="remarks" placeholder="Napomene" [form]="form()!" [validation]="['maxlength']"
        [big]="true" />

    <marush-field-group class="column-12" addOperationDescription="Dodaj termin" dynamicContentName="appointments"
        title="Termini" [addDynamicContent]="addAppointment" [formGroup]="form()!">
        @for(appointment of appointments.controls; track $index)
        {
        <div class="row column-12" [class.field-group-section]="!$last">
            <div class="column-12 field-container grow-nested-block">
                <marush-date-picker class="field-container column-12 column-tablet-4" name="date" placeholder="Tretman" [form]="appointment" [startDate]="today" />
                <marush-input class="field-container column-12 offset-tablet-1 column-tablet-7" name="description" placeholder="Opis" [form]="appointment"
                    [validation]="['required','maxlength']" [big]="true" />
            </div>
            <button class="main-action delete-action clients-delete-action " type="button"
                (click)="removeAppointment($index)">
                <img class="icon" alt="Ukloni termin" src="/assets/images/actions/trash-can.svg">
            </button>
        </div>
        }
    </marush-field-group>
    <div class="actions aligned-centrally stretch-equally column-12">
        <p class="invalid-field-message" [class.hidden]="!globalError()">{{globalError()}}</p>
        <button type="submit" class="main-action"><span>Sačuvaj</span></button>
        <button type="button" class="cancel-action" (click)="goBack()"><span>Odustani</span></button>
    </div>
</form>
}
