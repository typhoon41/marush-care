<!-- eslint-disable @angular-eslint/template/prefer-static-string-properties -->
<form class="search-form row column-12" [formGroup]="form" (submit)="onSubmit()">
    <marush-input class="search-input" name="name" [form]="form" [autoComplete]="true"
        [placeholder]="'Ime i(li) Prezime'" [validation]="['maxlength']" />
    <button type="submit" class="main-action"><span>Pretraži</span></button>
    <button type="button" class="main-action add-action" (click)="onAdd()">
        <img class="icon" src="/assets/images/actions/plus-sign.svg" alt="Dodaj klijenta">
        <span>Dodaj</span>
    </button>
</form>

<marush-table-pagination [tableMetadata]="tableMetadata" [tableContent]="tableContent()" />
